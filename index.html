<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Eric West" />
    <meta
      name="description"
      content="Admin dashboard assignment for The Odin Project"
    />
    <title>TOP - Admin Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" defer />
  </head>
  <body>
    <!-- Header -->
    <header class="header">
      <div class="search-container">
        <label for="search"></label>
        <input type="text" name="search" id="search" />
      </div>
      <div class="user-container">
        <img src="" alt="Notification icon" class="notification" />
        <img src="" alt="User Profile" class="user-profile-sm" />
        <h3>Morgan Oakley</h3>
      </div>
      <div class="welcome-container">
        <img src="" alt="User profile image" class="user-profile" />
        <p class="welcome-msg">Hi there,</p>
        <h3 class="user-name">Morgan Oakley (@morgan)</h3>
      </div>
      <div class="main-btn-container">
        <button class="main-btn">New</button>
        <button class="main-btn">Upload</button>
        <button class="main-btn">Share</button>
      </div>
    </header>
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="logo">
        <img src="" alt="" class="logo-img" />
        <h3>Dashboard</h3>
      </div>
      <!-- Nav Links -->
      <nav class="nav-links">
        <ul>
          <li>
            <img src="" alt="Home" />
            <p>Home</p>
          </li>
          <li>
            <img src="" alt="Profile" />
            <p>Profile</p>
          </li>
          <li>
            <img src="" alt="Messages" />
            <p>Messages</p>
          </li>
          <li>
            <img src="" alt="History" />
            <p>History</p>
          </li>
          <li>
            <img src="" alt="Tasks" />
            <p>Tasks</p>
          </li>
          <li>
            <img src="" alt="Communities" />
            <p>Communities</p>
          </li>
          <li>
            <img src="" alt="Settings" />
            <p>Settings</p>
          </li>
          <li>
            <img src="" alt="Support" />
            <p>Support</p>
          </li>
          <li>
            <img src="" alt="Privacy" />
            <p>Privacy</p>
          </li>
        </ul>
      </nav>
    <!-- Main Content -->
  </body>
</html>
